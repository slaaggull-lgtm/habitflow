<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="habitCard(habit, done, redirectUrl, squares)" class="habit-card" th:classappend="${done} ? ' habit-card-done' : ''">
    <div class="habit-dot" th:style="'background:' + ${habit.color}"></div>

    <div class="habit-info">
        <div class="habit-name">
            <span th:text="${habit.category.emoji}"></span>
            <span th:text="${habit.name}"></span>
            <span th:if="${done}" class="done-pill">Done</span>
        </div>
        <div class="habit-desc"
             th:if="${habit.description != null and !habit.description.isEmpty()}"
             th:text="${habit.description}"></div>

        <div class="habit-progress-wrap">
            <div class="habit-progress-bar">
                <div class="habit-progress-fill"
                     th:style="'width:' + ${habit.progressPercent} + '%; background:' + ${habit.color}"></div>
            </div>
            <span class="progress-pct" th:text="${habit.progressPercentFormatted} + '%'">0%</span>
        </div>

        <div class="progress-squares" th:if="${squares != null}">
            <span class="progress-square" th:each="s : ${squares}"
                  th:classappend="${s} ? ' filled' : ''"
                  th:style="${s} ? ('background:' + ${habit.color}) : ''"></span>
        </div>

        <div class="habit-meta">
            <span class="meta-chip">🔥 <span th:text="${habit.currentStreak}"></span> day streak</span>
            <span class="meta-chip">✓ <span th:text="${habit.totalCompletions}"></span> total</span>
            <span class="meta-pill" th:text="${habit.targetDays} + '-day goal'"></span>
        </div>
    </div>

    <form th:action="@{'/habits/' + ${habit.id} + '/toggle'}" method="post">
        <input type="hidden" name="redirect" th:value="${redirectUrl}"/>
        <button type="submit" class="check-btn" th:classappend="${done} ? ' check-btn-done' : ''"
                th:text="${done} ? '✓' : '○'" th:attr="aria-label=${done} ? 'Mark undone' : 'Mark done'">○</button>
    </form>
</div>

</body>
</html>
