<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Users', ~{::content})}">
<body>
<th:block th:fragment="content">

<div class="page">
    <div class="page-header">
        <div>
            <h1 class="page-title">👥 Users</h1>
            <p class="page-subtitle">Manage HabitFlow user profiles</p>
        </div>
    </div>

    <div class="form-card" style="margin-bottom:24px;">
        <form th:action="@{/users/new}" method="post">
            <div class="form-group">
                <label class="form-label">Name <span class="form-required">*</span></label>
                <input type="text" name="name" class="form-input" placeholder="e.g. Jane Doe" required maxlength="80"/>
            </div>
            <div class="form-group">
                <label class="form-label">Email <span class="form-optional">(optional)</span></label>
                <input type="email" name="email" class="form-input" placeholder="jane@example.com" maxlength="120"/>
            </div>
            <div class="form-group">
                <label class="form-label">Avatar <span class="form-optional">(optional emoji)</span></label>
                <input type="text" name="avatar" class="form-input" placeholder="🌱" maxlength="4"/>
            </div>
            <button type="submit" class="btn-primary">Add User</button>
        </form>
    </div>

    <div class="settings-section">
        <div class="settings-section-title">All Users</div>

        <div th:if="${#lists.isEmpty(users)}" class="empty-state">
            <p>No users yet. Add the first one above.</p>
        </div>

        <div th:each="u : ${users}" class="settings-row">
            <div class="settings-row-info">
                <div class="settings-row-label">
                    <span th:text="${u.avatar + ' ' + u.name}">🌱 Name</span>
                    <span th:if="${currentUser != null and currentUser.id == u.id}"
                          style="margin-left:8px;font-size:11px;font-weight:600;color:var(--success);background:var(--success-bg);padding:2px 8px;border-radius:20px;">Active</span>
                </div>
                <div class="settings-row-sub" th:text="${u.email != null and u.email != '' ? u.email : 'No email'} + ' · joined ' + ${u.createdDate}">No email</div>
            </div>
            <div class="settings-row-control" style="display:flex;gap:8px;">
                <form th:if="${currentUser == null or currentUser.id != u.id}" th:action="@{'/users/' + ${u.id} + '/select'}" method="post">
                    <button type="submit" class="btn-primary" style="font-size:13px;padding:8px 14px;">Set Active</button>
                </form>
                <form th:action="@{'/users/' + ${u.id} + '/delete'}" method="post">
                    <button type="submit" class="btn-secondary" style="font-size:13px;padding:8px 14px;">Remove</button>
                </form>
            </div>
        </div>
    </div>
</div>

</th:block>
</body>
</html>
