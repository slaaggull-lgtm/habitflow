<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('My Habits', ~{::content})}">
<body>
<th:block th:fragment="content">

<div class="page">

    <div class="page-header">
        <div>
            <h1 class="page-title">My Habits</h1>
            <p class="page-subtitle">Manage and track all your habits</p>
        </div>
        <a th:href="@{/habits/new}" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="width:14px;height:14px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Habit
        </a>
    </div>

    <!-- Summary row -->
    <div class="habits-summary-row" th:if="${!habits.isEmpty()}">
        <div class="summary-chip">
            <strong th:text="${habits.size()}">0</strong> habits
        </div>
        <div class="summary-chip">
            <strong th:text="${doneMap.values().stream().filter(v -> v).count()}">0</strong> done today
        </div>
    </div>

    <!-- Category filters -->
    <div class="filter-bar">
        <a th:href="@{/habits}" class="filter-btn" th:classappend="${activeFilter == 'All'} ? ' active' : ''">All</a>
        <a th:each="cat : ${categories}"
           th:href="@{/habits(filter=${cat.label})}"
           class="filter-btn"
           th:classappend="${activeFilter == cat.label} ? ' active' : ''"
           th:text="${cat.emoji + ' ' + cat.label}"></a>
    </div>

    <!-- Empty state -->
    <div th:if="${habits.isEmpty()}" class="empty-state">
        <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;opacity:0.35;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div class="empty-title">No habits here</div>
        <div class="empty-sub">Try a different filter or add a new habit</div>
        <a th:href="@{/habits/new}" class="btn-primary">＋ Add Habit</a>
    </div>

    <!-- Habits list -->
    <div class="habits-list" th:if="${!habits.isEmpty()}">
        <div th:each="habit : ${habits}" class="habit-row-wrap">
            <th:block th:replace="~{fragments/habit-card :: habitCard(${habit}, ${doneMap[habit.id]}, '/habits')}"/>
            <!-- Edit / Delete overlay buttons -->
            <div class="habit-actions">
                <a th:href="@{'/habits/' + ${habit.id} + '/edit'}" class="action-btn edit-btn" title="Edit">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </a>
                <form th:action="@{'/habits/' + ${habit.id} + '/delete'}" method="post"
                      onsubmit="return confirm('Delete this habit?')">
                    <button type="submit" class="action-btn delete-btn" title="Delete">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>

</th:block>
</body>
</html>
