<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${editMode ? 'Edit Habit' : 'New Habit'}, ~{::content})}">
<body>
<th:block th:fragment="content">

<div class="page">
    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="${editMode} ? 'Edit Habit' : 'New Habit'">New Habit</h1>
            <p class="page-subtitle">Small steps lead to big changes</p>
        </div>
    </div>

    <div class="form-card">
        <form th:action="${editMode} ? @{'/habits/' + ${habit.id} + '/edit'} : @{'/habits/new'}" method="post">

            <div class="form-group">
                <label class="form-label">Habit Name <span class="form-required">*</span></label>
                <input type="text" name="name" class="form-input"
                       placeholder="e.g. Drink 8 glasses of water"
                       th:value="${habit.name}" required maxlength="100"/>
            </div>

            <div class="form-group">
                <label class="form-label">Description <span class="form-optional">(optional)</span></label>
                <textarea name="description" class="form-textarea" rows="3"
                          placeholder="What does this habit involve?"
                          th:text="${habit.description}" maxlength="300"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Category <span class="form-required">*</span></label>
                <select name="category" class="form-select" required>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.name()}"
                            th:text="${cat.display}"
                            th:selected="${habit.category != null and habit.category == cat}"></option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Target Days: <strong id="targetLabel" th:text="${habit.targetDays > 0 ? habit.targetDays : 21}">21</strong> days</label>
                <input type="range" name="targetDays" class="form-range"
                       min="7" max="90" step="1"
                       th:value="${habit.targetDays > 0 ? habit.targetDays : 21}"
                       oninput="document.getElementById('targetLabel').textContent = this.value"/>
                <div class="range-labels">
                    <span>7</span><span>30</span><span>66</span><span>90 days</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Color Theme</label>
                <div class="color-picker">
                    <div th:each="col : ${palette}"
                         class="color-dot"
                         th:classappend="${habit.color == col or (habit.color == null and col == '#7BA05B')} ? ' selected' : ''"
                         th:style="'background:' + ${col}"
                         th:attr="data-color=${col}"></div>
                </div>
                <input type="hidden" name="color" id="colorInput"
                       th:value="${habit.color != null ? habit.color : '#7BA05B'}"/>
            </div>

            <div class="form-actions">
                <a th:href="@{/habits}" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary"
                        th:text="${editMode} ? 'Save Changes' : 'Create Habit'">Create Habit</button>
            </div>
        </form>
    </div>
</div>

</th:block>
</body>
</html>
