<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('My Habits', ~{::content})}">
<body>
<th:block th:fragment="content">

<div class="page">

    <div class="page-header">
        <div>
            <h1 class="page-title">✅ My Habits</h1>
            <p class="page-subtitle">Manage and track all your habits</p>
        </div>
        <a th:href="@{/habits/new}" class="btn-primary">＋ New Habit</a>
    </div>

    <!-- Progress banner -->
    <div class="progress-banner" th:if="${totalCount > 0}">
        <div class="progress-banner-text">
            <span class="progress-banner-num" th:text="${doneCount}">0</span>
            <span class="progress-banner-label"> of <span th:text="${totalCount}">0</span> habits completed today</span>
        </div>
        <div class="progress-banner-bar">
            <div class="progress-banner-fill"
                 th:style="'width:' + (${totalCount} > 0 ? (${doneCount} * 100 / ${totalCount}) : 0) + '%'"></div>
        </div>
    </div>

    <!-- Category filters -->
    <div class="filter-bar">
        <a th:href="@{/habits}" class="filter-btn" th:classappend="${activeFilter == 'All'} ? ' active' : ''">All</a>
        <a th:each="cat : ${categories}"
           th:href="@{/habits(filter=${cat.label})}"
           class="filter-btn"
           th:classappend="${activeFilter == cat.label} ? ' active' : ''"
           th:text="${cat.emoji + ' ' + cat.label}"></a>
    </div>

    <!-- Empty state -->
    <div th:if="${habits.isEmpty()}" class="empty-state">
        <div class="empty-emoji">🌱</div>
        <div class="empty-title">No habits here yet</div>
        <div class="empty-sub">Add your first habit to get started on your growth journey</div>
        <a th:href="@{/habits/new}" class="btn-primary">＋ Add Your First Habit</a>
    </div>

    <!-- Habits table-style list -->
    <div class="habits-full-list" th:if="${!habits.isEmpty()}">

        <div class="habit-list-header">
            <span class="hlh-name">Habit</span>
            <span class="hlh-streak">Streak</span>
            <span class="hlh-progress">Progress</span>
            <span class="hlh-total">Check-ins</span>
            <span class="hlh-actions">Actions</span>
        </div>

        <div th:each="habit : ${habits}" class="habit-full-row" th:classappend="${doneMap[habit.id]} ? ' habit-full-done' : ''">

            <!-- Color bar -->
            <div class="hfr-color" th:style="'background:' + ${habit.color}"></div>

            <!-- Name + category -->
            <div class="hfr-name">
                <span class="hfr-emoji" th:text="${habit.category.emoji}"></span>
                <div class="hfr-name-info">
                    <div class="hfr-title" th:text="${habit.name}"></div>
                    <div class="hfr-cat" th:text="${habit.category.label}"></div>
                </div>
                <span th:if="${doneMap[habit.id]}" class="done-pill">Done</span>
            </div>

            <!-- Streak -->
            <div class="hfr-streak">
                <div class="streak-val" th:text="${habit.currentStreak}">0</div>
                <div class="streak-sub">days</div>
            </div>

            <!-- Progress -->
            <div class="hfr-progress">
                <div class="hfr-progress-wrap">
                    <div class="mini-progress-bar">
                        <div class="mini-progress-fill"
                             th:style="'width:' + ${habit.progressPercent} + '%; background:' + ${habit.color}"></div>
                    </div>
                    <span class="mini-pct" th:text="${habit.progressPercentFormatted} + '%'">0%</span>
                </div>
                <div class="hfr-goal" th:text="${habit.targetDays} + '-day goal'"></div>
            </div>

            <!-- Total completions -->
            <div class="hfr-total">
                <div class="total-val" th:text="${habit.totalCompletions}">0</div>
                <div class="total-sub">total</div>
            </div>

            <!-- Actions -->
            <div class="hfr-actions">
                <!-- Toggle -->
                <form th:action="@{'/habits/' + ${habit.id} + '/toggle'}" method="post" style="display:inline;">
                    <input type="hidden" name="redirect" value="/habits"/>
                    <button type="submit" class="act-check" th:classappend="${doneMap[habit.id]} ? ' act-check-done' : ''"
                            th:title="${doneMap[habit.id]} ? 'Mark undone' : 'Mark done'">
                        <span th:text="${doneMap[habit.id]} ? '✓' : '○'">○</span>
                    </button>
                </form>
                <!-- Edit -->
                <a th:href="@{'/habits/' + ${habit.id} + '/edit'}" class="act-btn" title="Edit">✏️</a>
                <!-- Delete -->
                <form th:action="@{'/habits/' + ${habit.id} + '/delete'}" method="post" style="display:inline;"
                      onsubmit="return confirm('Delete this habit? This cannot be undone.')">
                    <button type="submit" class="act-btn act-delete" title="Delete">🗑</button>
                </form>
            </div>
        </div>

    </div>

</div>

</th:block>
</body>
</html>
