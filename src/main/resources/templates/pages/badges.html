<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Badges', ~{::content})}">
<body>
<th:block th:fragment="content">

<div class="page">

    <div class="page-header">
        <div>
            <h1 class="page-title">🏅 Badges</h1>
            <p class="page-subtitle">Your achievements and milestones</p>
        </div>
    </div>

    <div class="badge-summary">
        <div class="bsp-text">
            <span class="bsp-count" th:text="${earnedCount}">0</span>
            <span class="bsp-total" th:text="' of ' + ${totalCount} + ' badges earned'"> of 10 badges earned</span>
        </div>
        <div class="bsp-bar">
            <div class="bsp-fill" th:style="'width:' + (${totalCount} > 0 ? (${earnedCount} * 100 / ${totalCount}) : 0) + '%'"></div>
        </div>
    </div>

    <section class="section" th:if="${!earnedBadges.isEmpty()}">
        <h2 class="section-title" style="margin-bottom:14px;">Earned ✨</h2>
        <div class="badges-grid">
            <div class="badge-card earned" th:each="b : ${earnedBadges}">
                <div class="badge-emoji" th:text="${b.type.emoji}"></div>
                <div class="badge-name" th:text="${b.type.name}"></div>
                <div class="badge-desc" th:text="${b.type.description}"></div>
                <div class="badge-date" th:text="'Earned ' + ${b.earnedDate}"></div>
            </div>
        </div>
    </section>

    <section class="section" th:if="${!lockedTypes.isEmpty()}">
        <h2 class="section-title" style="margin-bottom:14px;">Locked 🔒</h2>
        <div class="badges-grid">
            <div class="badge-card locked" th:each="t : ${lockedTypes}">
                <div class="badge-emoji" th:text="${t.emoji}"></div>
                <div class="badge-name" th:text="${t.name}"></div>
                <div class="badge-desc" th:text="${t.description}"></div>
            </div>
        </div>
    </section>

    <div class="empty-state" th:if="${earnedBadges.isEmpty() and lockedTypes.isEmpty()}">
        <div class="empty-emoji">🏅</div>
        <div class="empty-title">No badges yet</div>
        <div class="empty-sub">Complete habits to earn your first badge!</div>
    </div>

</div>

</th:block>
</body>
</html>
